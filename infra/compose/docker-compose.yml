# Base compose for the Rust vmcp gateway + its demo upstream MCP set.
#
# Run from the repo root:
#   docker compose -f infra/compose/docker-compose.yml up --build
#
# Layered with overrides for production (real domain + ACME + image pull):
#   docker compose \
#     -f infra/compose/docker-compose.yml \
#     -f infra/compose/docker-compose.prod.yml \
#     up -d
#
# Or for source-deploy on a target server:
#   docker compose \
#     -f infra/compose/docker-compose.yml \
#     -f infra/compose/docker-compose.deploy.yml \
#     up -d --build
#
# Services on one private bridge network:
#   vmcp          — Rust gateway, plain HTTP on 8765 inside the network
#   postgres      — seeded `demo` database, queried by the postgres MCP
#   dagger-engine — sidecar runtime for `container-use` (cu stdio)
#   caddy         — fronts everything on :443 with TLS (Let's Encrypt in prod)
#
# Build context is the repo root so the Dockerfile can pull Cargo.toml,
# crates/, mcp/, vmcp.toml, registry.json in a single layer.

services:
  vmcp:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    image: vmcp:latest
    environment:
      # --- listen ---
      VMCP_HOST: "0.0.0.0"
      VMCP_PORT: "8765"
      # --- OAuth issuer URL: https or localhost (RFC 8414). Dev defaults
      # to localhost; prod overlay overrides with the real https://... .
      VMCP_PUBLIC_BASE_URL: "http://localhost:8765"
      # --- config + registry paths inside the image ---
      VMCP_CONFIG:         "/app/vmcp.toml"
      VMCP_REGISTRY_PATH:  "/app/registry.json"
      VMCP_SPEC_DIR:       "/app/specs"
      VMCP_SKILLS_DIR:     "/app/skills"
      # --- auth (Rust schema uses nested key with `__` separator) ---
      # Generate hash with: docker run --rm vmcp:latest hash-password
      VMCP_AUTH__MASTER_PASSWORD_ARGON2: "${VMCP_MASTER_PASSWORD_HASH:-}"
      # --- container-use upstream connects to the dagger-engine sidecar ---
      _EXPERIMENTAL_DAGGER_RUNNER_HOST: "tcp://dagger-engine:8080"
    volumes:
      # Mount the dev registry (single rust-demo upstream). Prod overlay
      # replaces this with infra/registry.demo.json (time + postgres + cu).
      - ../../registry.json:/app/registry.json:ro
      - ../../vmcp.toml:/app/vmcp.toml:ro
      - ../../specs:/app/specs:ro
      - ../../skills:/app/skills:ro
    expose:
      - "8765"
    ports:
      # Direct plain-HTTP for local debugging only; prod overlay removes.
      - "127.0.0.1:8765:8765"
    depends_on:
      postgres:
        condition: service_healthy
      dagger-engine:
        condition: service_started
    networks:
      - vmcp-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       "demo"
      POSTGRES_USER:     "demo"
      POSTGRES_PASSWORD: "demo"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - vmcp-net
    # No host port published — only vmcp reaches it via postgres:5432.

  dagger-engine:
    image: registry.dagger.io/engine:v0.20.6
    privileged: true
    volumes:
      - dagger-engine-data:/var/lib/dagger
    networks:
      - vmcp-net
    command:
      - "--addr"
      - "tcp://0.0.0.0:8080"
      - "--addr"
      - "unix:///var/run/buildkit/buildkitd.sock"

  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - vmcp
    networks:
      - vmcp-net

volumes:
  caddy-data:
  caddy-config:
  dagger-engine-data:
  postgres-data:

networks:
  vmcp-net:
    driver: bridge
