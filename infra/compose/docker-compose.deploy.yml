# Source-deploy overlay — builds the vmcp image on the target server
# from rsynced source instead of pulling from a registry.
#
# Usage on the server (185.142.99.223 → mcp.runmcp.ru):
#   cd ~/vmcp/infra/compose && \
#     docker compose \
#       -f docker-compose.yml \
#       -f docker-compose.deploy.yml \
#       up -d --build
#
# Required env vars (in ./.env next to this file):
#   VMCP_DOMAIN                  Fully-qualified hostname Caddy serves
#                                (e.g. mcp.runmcp.ru — A record → this host)
#   VMCP_ACME_EMAIL              Contact email for Let's Encrypt
#   VMCP_MASTER_PASSWORD_HASH    argon2id hash; generate with:
#                                  docker run --rm vmcp:source hash-password
#
# This overlay is meant for direct ssh-deploy onto a single VM that doesn't
# pull from a private registry. For a registry-pull flow use prod.yml.

services:
  vmcp:
    image: vmcp:source
    pull_policy: never
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    restart: always
    ports: !reset []
    environment:
      VMCP_PUBLIC_BASE_URL:               "https://${VMCP_DOMAIN}"
      # auth.issuer is nested → double underscore separator (figment .split("__"))
      VMCP_AUTH__ISSUER:                  "https://${VMCP_DOMAIN}"
      VMCP_AUTH__MASTER_PASSWORD_ARGON2:  "${VMCP_MASTER_PASSWORD_HASH}"
      # 30s default is too tight for cold-npm-cache `npx -y` upstreams
      # (agentmemory in particular). Bump to 120s so first boot after a
      # rebuild has time to fetch the package.
      VMCP_UPSTREAM__SPAWN_TIMEOUT_MS:    "120000"
    volumes:
      # Public demo upstream set (time + postgres + container-use).
      # Listed in full because compose volume-list merge depends on the
      # target path; explicit > implicit.
      - ../registry.demo.json:/app/registry.json:ro
      - ../../vmcp.toml:/app/vmcp.toml:ro
      - ../specs:/app/specs:ro
      - ../../skills:/app/skills:ro

  postgres:
    restart: always

  dagger-engine:
    restart: always

  caddy:
    restart: always
    environment:
      VMCP_DOMAIN:     "${VMCP_DOMAIN}"
      VMCP_ACME_EMAIL: "${VMCP_ACME_EMAIL}"
    volumes:
      - ../caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
