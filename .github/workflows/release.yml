name: release

# Builds release artifacts for every platform + variant and, on a version tag,
# attaches them to a GitHub Release and pushes a Docker image to GHCR.
#
#   * Binaries: Linux / Windows / macOS (x86_64 + arm64), each in two variants:
#       - vmcp        — full HTTP gateway (web + admin)         [default features]
#       - vmcp-stdio  — minimal stdio-only build (no admin)     [--no-default-features]
#   * Docker: ghcr.io/<owner>/vmcp runtime image (full web + admin).
#
# Trigger: push a tag like `v0.2.0`, or run manually (workflow_dispatch — builds
# and uploads workflow artifacts only, no Release / image push).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  binaries:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # attach archives to the Release on tag pushes
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            ext: ".exe"
          - os: macos-13
            target: x86_64-apple-darwin
            name: macos-x86_64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-aarch64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & package (full — web + admin)
        shell: bash
        run: |
          cargo build --release --locked -p vmcp --target "${{ matrix.target }}"
          bash .github/scripts/package.sh \
            "vmcp-${{ steps.meta.outputs.version }}-${{ matrix.name }}" \
            "target/${{ matrix.target }}/release/vmcp${{ matrix.ext }}"

      - name: Build & package (stdio-minimal — no admin)
        shell: bash
        run: |
          cargo build --release --locked -p vmcp --no-default-features --target "${{ matrix.target }}"
          bash .github/scripts/package.sh \
            "vmcp-stdio-${{ steps.meta.outputs.version }}-${{ matrix.name }}" \
            "target/${{ matrix.target }}/release/vmcp${{ matrix.ext }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vmcp-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

  docker:
    name: docker (ghcr)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha

      - name: Build & push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          # Push only on tags; on manual runs just validate the build.
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
